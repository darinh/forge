name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agents-drift:
    name: Agents drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify .agent.md files match .tmpl + preambles
        run: scripts/build-agents.sh --check
